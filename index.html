<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Simples</title>
    <link rel="stylesheet" href="styles/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <header>
    <nav>
    </nav>
    </header>

    <main class="vh-100 d-flex justify-content-center align-items-center">
    <div class="card shadow p-4 border-0" style="width: 500px;">
    <h2 id="titulo" class="text-center fw-bold mb-5">Login</h2>
    <form id="form-login">
    <div id="c-email" class="mb-4">
    <label for="email" class="form-label">Email:</label>
    <input type="email" class="form-control form-control-lg"  placeholder="Digite seu email">
    </div>
    <div id="c-senha" class="mb-4">
    <label for="senha" class="form-label">Senha:</label>
    <input type="password" id="senha" class="form-control form-control-lg" placeholder="Digite sua senha">
    </div>
    <button id="botao-envio" type="submit" class="btn btn-primary btn-lg w-100 mb-4">Entrar</button>
    </form>
    <div id="mensagem"></div>
    <div class="text-center fs-5" id="toggle">
    <p>
    Não tem conta?
    <a href="#">Cadastre-se</a>
</p>
    </div>
    </div>
    </main>

    <footer>
    </footer>

    <script src="scripts/script.js"></script>
</body>

</html>
